name: Hello World

on: push

jobs:
  hello-from-env:
    runs-on: ubuntu-latest
    environment: dev   # 👈 THIS IS THE KEY

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print Variable
        run: echo "Variable value is ${{ vars.APP_ID }}"

      - name: Print Secret
        run: echo "Secret value is ${{ secrets.APP_ID }}"
